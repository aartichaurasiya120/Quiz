<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Online Quiz Test</title>
</head>
<body>

<h1>Online Quiz Test</h1>

<div id="quizContainer"></div>

<button onclick="submitQuiz()">Submit</button>
<div id="result"></div>

<!-- 👇 JS ko yaha bottom pe rakho -->
<script>
const questions = [
  { question: "5+7?", options:["10","11","12","13"], answer:"12" },
  { question: "18÷3?", options:["5","6","7","8"], answer:"6" }
];

const container = document.getElementById("quizContainer");

questions.forEach((q,i)=>{
  let html = `<p>${q.question}</p>`;
  q.options.forEach(opt=>{
    html += `<input type="radio" name="q${i}" value="${opt}">${opt}<br>`;
  });
  container.innerHTML += html;
});

function submitQuiz(){
  let score=0;

  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name="q${i}"]:checked`);
    if(ans && ans.value===q.answer) score++;
  });

  document.getElementById("result").innerText =
    `Score: ${score}/${questions.length}`;
}
</script>

</body>
</html>
